name: Publish crates

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example: v0.1.1)"
        required: true
        type: string
      dry_run:
        description: "Run cargo publish --dry-run only"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: crates-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish public crates
    runs-on: ubuntu-latest

    steps:
      - name: Resolve inputs
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.release.outputs.tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify workspace version matches tag
        shell: bash
        run: |
          TAG_VERSION="${{ steps.release.outputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          WORKSPACE_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)
          if [ "$WORKSPACE_VERSION" != "$TAG_VERSION" ]; then
            echo "Workspace version ($WORKSPACE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Cargo publish dry run for main crate
        if: steps.release.outputs.dry_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo publish --dry-run --locked -p opencode-provider-manager

      - name: Check GUI crate in dry run mode
        if: steps.release.outputs.dry_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo check --locked -p opencode-provider-manager-gui

      - name: Publish main crate
        if: steps.release.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo publish --locked -p opencode-provider-manager

      - name: Wait for main crate to appear in crates.io index
        if: steps.release.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if cargo search opencode-provider-manager --limit 1 | grep -q '^opencode-provider-manager ='; then
              echo "opencode-provider-manager is visible in crates.io index"
              exit 0
            fi
            echo "Waiting for crates.io index propagation (attempt ${attempt}/30)..."
            sleep 10
          done
          echo "Timed out waiting for opencode-provider-manager to appear in crates.io index"
          exit 1

      - name: Publish GUI crate
        if: steps.release.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo publish --locked -p opencode-provider-manager-gui
