name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: opm-x86_64-linux
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: opm-aarch64-linux
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: opm-x86_64-windows
            ext: ".exe"
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: opm-aarch64-windows
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: opm-aarch64-macos
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: opm-x86_64-macos
            ext: ""

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --bin opm --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Strip binary (native only)
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/opm${{ matrix.ext }}

      - name: Strip binary (Linux ARM64 cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/opm${{ matrix.ext }}

      - name: Rename binary
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/opm${{ matrix.ext }} opm-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: opm-${{ matrix.target }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum */* > ../checksums.txt
          mv ../checksums.txt .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            artifacts/checksums.txt

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Verify workspace version matches tag
        shell: bash
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          WORKSPACE_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)
          if [ "$WORKSPACE_VERSION" != "$TAG_VERSION" ]; then
            echo "Workspace version ($WORKSPACE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish main crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          cargo publish --locked -p opencode-provider-manager

      - name: Wait for main crate to appear in crates.io index
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              --header "User-Agent: opencode-provider-manager-release-workflow" \
              https://crates.io/api/v1/crates/opencode-provider-manager | grep -q "\"newest_version\":\"${TAG_VERSION}\""; then
              echo "opencode-provider-manager ${TAG_VERSION} is visible in crates.io API"
              exit 0
            fi
            echo "Waiting for crates.io index propagation (attempt ${attempt}/30)..."
            sleep 10
          done
          echo "Timed out waiting for opencode-provider-manager to appear in crates.io index"
          exit 1

      - name: Publish GUI crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          cargo publish --locked -p opencode-provider-manager-gui

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      - name: Verify npm version matches tag
        shell: bash
        working-directory: npm
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "npm/package.json version ($PACKAGE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish package
        working-directory: npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
