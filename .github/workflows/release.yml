name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: opm-x86_64-linux
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: opm-aarch64-linux
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: opm-x86_64-windows
            ext: ".exe"
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: opm-aarch64-windows
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: opm-aarch64-macos
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: opm-x86_64-macos
            ext: ""

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --bin opm --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/opm${{ matrix.ext }}

      - name: Rename binary
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/opm${{ matrix.ext }} opm-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: opm-${{ matrix.target }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum */* > ../checksums.txt
          mv ../checksums.txt .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            artifacts/checksums.txt
